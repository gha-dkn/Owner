        // UPDATED saveProject function – this is where the upload happens
        async function saveProject(project, status = "published") {
            try {
                let imageUrl = project.image; // default to existing/pasted URL

                // If user selected a file → upload it
                if (selectedImageFile) {
                    console.log("Starting upload to correct bucket...");
                    const storagePath = `project-images/${Date.now()}-${selectedImageFile.name}`;
                    const storageRef = ref(storage, storagePath);

                    const uploadTask = uploadBytesResumable(storageRef, selectedImageFile);

                    // Optional: progress logging
                    uploadTask.on('state_changed',
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            console.log(`Upload progress: ${progress}%`);
                        },
                        (error) => {
                            console.error("Upload failed:", error);
                            throw error;
                        },
                        async () => {
                            imageUrl = await getDownloadURL(uploadTask.snapshot.ref);
                            console.log("Upload complete. Download URL:", imageUrl);
                        }
                    );

                    // Wait for upload to finish
                    await uploadTask;
                }

                const payload = {
                    title: project.title,
                    category: project.category,
                    image: imageUrl,
                    summary: project.summary,
                    detail: project.detail,
                    status: status,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };

                if (editingId) {
                    await updateDoc(doc(db, "projects", editingId), payload);
                    console.log("Project updated");
                } else {
                    await addDoc(collection(db, "projects"), payload);
                    console.log("Project published");
                }

                return imageUrl;
            } catch (err) {
                console.error("Save/publish error:", err.code, err.message);
                throw err;
            }
        }
