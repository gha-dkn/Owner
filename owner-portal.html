    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsY8A38H9mSR9Qbydeo0NWe4VPDneFEGQ",
            authDomain: "ameri-solutions.firebaseapp.com",
            projectId: "ameri-solutions",
            storageBucket: "ameri-solutions.firebasestorage.app",
            messagingSenderId: "790563539005",
            appId: "1:790563539005:web:786c51f48868079aacc254"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app, "ameri-solutions.firebasestorage.app");

        console.log("Firebase initialized with bucket:", storage.app.options.storageBucket);

        // ==================== PASTE YOUR FULL ORIGINAL JAVASCRIPT LOGIC HERE ====================
        // All variables, DOM queries, event listeners, preview function, published projects loading, etc.
        // Especially:
        // - const loginForm = document.getElementById('login-form');
        // - const projectForm = document.getElementById('project-form');
        // - onAuthStateChanged(...)
        // - loginForm.addEventListener('submit', ...)
        // - projectForm.addEventListener('submit', ...)
        // - Your preview button handler
        // - Published projects rendering

        // Example minimal auth handler (add your full version)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-shell').style.display = 'block';
            } else {
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('app-shell').style.display = 'none';
            }
        });

        // Your saveProject function with upload fix
        async function saveProject(project, status = "published") {
            try {
                let imageUrl = project.image || '';

                // Replace with your actual file input variable name
                const fileInput = document.getElementById('project-image-file'); // ← change ID if different
                const selectedFile = fileInput?.files?.[0];

                if (selectedFile) {
                    console.log("Starting upload to correct bucket...");
                    const storagePath = `project-images/${Date.now()}-${selectedFile.name}`;
                    const storageRef = ref(storage, storagePath);
                    const uploadTask = uploadBytesResumable(storageRef, selectedFile);

                    uploadTask.on('state_changed',
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            console.log(`Upload progress: ${progress}%`);
                        },
                        (error) => console.error("Upload error:", error),
                        async () => {
                            imageUrl = await getDownloadURL(uploadTask.snapshot.ref);
                            console.log("Upload complete. URL:", imageUrl);
                        }
                    );

                    await uploadTask;
                }

                const payload = {
                    title: project.title,
                    category: project.category,
                    image: imageUrl,
                    summary: project.summary,
                    detail: project.detail,
                    status,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };

                // Replace with your actual logic (addDoc or updateDoc)
                await addDoc(collection(db, "projects"), payload);
                console.log("Project saved successfully");

            } catch (err) {
                console.error("Save error:", err.code, err.message);
            }
        }

        // Add your full form submit logic here
        // document.getElementById('project-form').addEventListener('submit', async (e) => { ... saveProject(...) });
    </script>
